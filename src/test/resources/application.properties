# ===== Test profile — used by @SpringBootTest / @ActiveProfiles("test") =====

# H2 in-memory DB (replaces MySQL)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT test secret (32+ bytes base64)
jwt.secret=dGVzdC1qd3Qtc2VjcmV0LWZvci1zcHJpbmdib290LXRlc3RzLW9ubHktMTIzNDU2Nzg5MA==
jwt.expiration=3600000

# Redis — Lettuce client stays lazy; beans wire but no connection until use
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RocketMQ — dummy broker (no autoconfig exclude; lazy init)
rocketmq.name-server=localhost:19876
rocketmq.producer.group=test-group

# Elasticsearch — dummy URI; client is lazy
spring.elasticsearch.uris=http://localhost:19200

# Sentinel — disable eager init
spring.cloud.sentinel.enabled=false
spring.cloud.sentinel.eager=false
