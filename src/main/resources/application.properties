spring.application.name=online-shopping
server.port=8080

# MySQL - ShardingSphere JDBC (replaces direct datasource)
spring.datasource.driver-class-name=org.apache.shardingsphere.driver.ShardingSphereDriver
spring.datasource.url=jdbc:shardingsphere:classpath:sharding-config.yaml

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dA==}
jwt.expiration=86400000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RocketMQ
rocketmq.name-server=localhost:9876
rocketmq.producer.group=online-shopping-producer

# ElasticSearch
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=elastic
spring.elasticsearch.password=${ES_PASSWORD:changeme}

# Sentinel
spring.cloud.sentinel.transport.dashboard=localhost:8858
spring.cloud.sentinel.transport.port=8719
spring.cloud.sentinel.eager=true

# Actuator
management.endpoints.web.exposure.include=health, info, metrics
management.endpoint.health.show-details=always